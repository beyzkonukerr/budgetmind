# Fly.io — https://fly.io/docs/
# İlk kurulum: FLY_YAYIN_REHBERI.md
# Uygulama adı benzersiz olmalı; fly launch sırasında değiştirilebilir.
app = "budgetmind-app"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

# Önce: fly volumes create budgetmind_data --region fra --size 1
# Bölge (region), primary_region ile aynı olmalı.
[mounts]
  source = "budgetmind_data"
  destination = "/data"
