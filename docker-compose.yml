# Yerelde Docker ile tam uygulama: docker compose up --build
services:
  budgetmind:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /data/budgetmind.db
      # Varsayilanlar yalnizca yerel Docker icin (production kurallarini gecer). Canlida .env ile degistirin.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-YerelDocker123}
      JWT_SECRET: ${JWT_SECRET:-01234567890123456789012345678901}
    volumes:
      - budgetmind_sqlite:/data

volumes:
  budgetmind_sqlite:
